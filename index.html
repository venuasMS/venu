<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#4facfe,#00f2fe);
}

.login-container{
    background:#fff;
    width:350px;
    padding:35px;
    border-radius:12px;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

.login-container h2{
    text-align:center;
    margin-bottom:25px;
    color:#333;
}

.input-group{
    margin-bottom:18px;
}

.input-group input{
    width:100%;
    padding:12px;
    border:1px solid #ccc;
    border-radius:6px;
    font-size:15px;
}

.input-group input:focus{
    outline:none;
    border-color:#4facfe;
    box-shadow:0 0 5px rgba(79,172,254,.4);
}

button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:6px;
    background:#4facfe;
    color:white;
    font-size:16px;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    background:#2b8ef7;
}

.footer{
    margin-top:15px;
    text-align:center;
    font-size:13px;
    color:#777;
}
</style>
</head>

<body>

<div class="login-container">
    <h2>Login</h2>

    <form action="https://formspree.io/f/xeeyzbkv" method="POST">

        <div class="input-group">
            <input
                type="text"
                name="input1"
                placeholder="Input 1"
                required>
        </div>

        <div class="input-group">
            <input
                type="text"
                name="input2"
                placeholder="Input 2"
                required>
        </div>

        <button type="submit">Submit</button>

    </form>

    <div class="footer">
        Demo Login Form
    </div>
</div>

</body>
</html>
