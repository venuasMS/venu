<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Data Submission Form</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#4facfe,#00c6fb);
}

.container{
    width:360px;
    background:#fff;
    padding:30px;
    border-radius:12px;
    box-shadow:0 10px 25px rgba(0,0,0,.2);
}

h2{
    text-align:center;
    margin-bottom:20px;
    color:#333;
}

.input-group{
    margin-bottom:18px;
}

.input-group input{
    width:100%;
    padding:12px;
    border:1px solid #ccc;
    border-radius:6px;
    font-size:15px;
}

.input-group input:focus{
    outline:none;
    border-color:#4facfe;
}

button{
    width:100%;
    padding:12px;
    background:#4facfe;
    color:#fff;
    border:none;
    border-radius:6px;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#2b8ef7;
}

.note{
    margin-top:15px;
    text-align:center;
    color:#666;
    font-size:13px;
}
</style>
</head>

<body>

<div class="container">

    <h2>Data Submission</h2>

    <form action="https://formspree.io/f/mrenlwdn" method="POST">

        <div class="input-group">
            <input
                type="text"
                name="input1"
                placeholder="Input 1"
                required>
        </div>

        <div class="input-group">
            <input
                type="text"
                name="input2"
                placeholder="Input 2"
                required>
        </div>

        <button type="submit">Submit</button>

    </form>

    <div class="note">
        This form submits two fields to Formspree.
    </div>

</div>

</body>
</html>
